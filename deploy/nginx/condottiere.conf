# Condottiere nginx site config (production template).
# Bootstraps HTTP reverse proxy so certbot can issue certs.
# After this file is enabled and nginx is reloaded, run:
#   sudo certbot --nginx -d condottiere.example.com --redirect

server {
    listen 80;
    listen [::]:80;
    server_name condottiere.example.com;

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
}
